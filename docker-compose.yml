version: "3.9"

services:
  claude-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-portal
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=claude-sonnet-4-6
      - MAX_TOKENS=4096
    volumes:
      # 10 GB data-volume til scripts, uploads og logs
      - claude_data:/data
      # Bind-mount så du kan redigere scripts direkte på Pi'en
      - ./scripts:/data/scripts
      - ./logs:/data/logs
    mem_limit: 512m          # Pas på Pi'ens RAM
    cpus: "1.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  claude_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/claude-data    # Mappe på Pi'en med 10 GB plads
